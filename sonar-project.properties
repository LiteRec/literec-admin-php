# Copy-paste detection exclusions.
#
# Genuinely reusable domain primitives (EmailAddress, PhoneNumber) live
# in the SharedDomain kernel under src/Shared/Domain/ValueObject/ and
# are consumed by every bounded context that needs them, so they do
# not produce cross-context CPD hits in the first place.
#
# Doctrine migrations remain excluded because the up()/down() table
# definitions are inherently boilerplate that CPD flags but adds no
# real abstraction opportunity.
#
# Per-context Doctrine custom types for UUID v7 identity VOs follow an
# identical 40-line shape (preg_match validation, fromString factory,
# convertToPHPValue/convertToDatabaseValue). The per-context split is
# required by the DDD no-share rule and Deptrac's ruleset (one context's
# infrastructure must not depend on another's), so every new aggregate
# adds a per-context *IdType.php wrapper. CPD on these wrappers conflicts
# with the architectural rule and adds no abstraction opportunity —
# the body is a thin transport wrapper around a regex.
sonar.cpd.exclusions=migrations/**,src/*/Infrastructure/Persistence/Doctrine/Type/*IdType.php

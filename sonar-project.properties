sonar.projectKey=LiteRec_literec-admin-php
sonar.organization=literec

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

sonar.php.coverage.reportPaths=

# Copy-paste detection exclusions.
#
# The project's CLAUDE.md forbids sharing value objects across bounded
# contexts ("Never share entities, value objects, or repositories
# across contexts; integrate through domain events, integration event
# DTOs, or explicit ACL services"). When two contexts genuinely need
# the same primitive (EmailAddress, PhoneNumber, postal Address), the
# rule forces a per-context copy of the validation logic.
#
# CPD on those files conflicts with the DDD rule, so they are excluded
# here rather than collapsed into a shared-kernel namespace. Sharing
# would let an unrelated change to Households' EmailAddress silently
# alter Inventory's behaviour — exactly what the no-share rule
# prevents.
#
# Doctrine migrations are excluded because the up()/down() table
# definitions are inherently boilerplate that CPD flags but adds no
# real abstraction opportunity.
sonar.cpd.exclusions=\
  src/*/Domain/ValueObject/EmailAddress.php,\
  src/*/Domain/ValueObject/PhoneNumber.php,\
  src/*/Domain/ValueObject/VendorAddress.php,\
  src/*/Domain/ValueObject/Address.php,\
  migrations/**

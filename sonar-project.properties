# Copy-paste detection exclusions.
#
# Genuinely reusable domain primitives (EmailAddress, PhoneNumber) live
# in the SharedDomain kernel under src/Shared/Domain/ValueObject/ and
# are consumed by every bounded context that needs them, so they do
# not produce cross-context CPD hits in the first place.
#
# Doctrine migrations remain excluded because the up()/down() table
# definitions are inherently boilerplate that CPD flags but adds no
# real abstraction opportunity.
sonar.cpd.exclusions=\
  migrations/**

# Whole-file exclusions. Migrations live outside sonar.sources but
# SonarCloud's autoscan still pulls them into the new-code window
# unless explicitly excluded — the boilerplate up()/down() shape
# would otherwise trip the new_duplicated_lines_density quality
# gate every time a new migration mirrors an earlier one.
# Pattern uses **/*.php (rather than just **) because SonarCloud
# autoscan only applies sonar.exclusions to language-detected
# files; an extensionless glob is silently ignored.
sonar.exclusions=\
  migrations/**/*.php,\
  migrations/*.php

# Per-rule issue exclusions.
#
# php:S2187 ("Add some tests to this class") fires on the repository
# *ContractTest classes because their #[Test] methods are provided by a
# shared *ContractCases trait (tests/Support/Trait/), not declared inline.
# Each contract trait is deliberately composed by two concrete classes —
# the InMemory adapter test (Unit) and the Doctrine adapter test
# (Integration) — so a single behavioural contract is verified against
# every implementation of the port. SonarCloud's PHP analyzer does not
# resolve trait-provided test methods, so it sees an "empty" test class.
# The tests are real and run in CI; suppress the false positive on the
# contract-test files only.
#
# Web:S6842 / Web:S6819 on the main navigation (_main_nav.html.twig) are the
# WAI-ARIA Authoring Practices menubar pattern: a role="menubar" <ul> whose
# <li>s carry role="presentation" so the role="menuitem" anchors read as the
# menu's items, with role="menu" submenus. SonarCloud flags the ARIA roles on
# the non-interactive <ul>/<li> elements, but removing them would discard the
# menubar semantics screen readers rely on. The keyboard interaction
# (arrow-key roving focus, Escape to close) is implemented via Alpine.
#
# Web:S6819 on _modal.html.twig is the role="dialog" + aria-modal="true" modal
# root. The element is an Alpine-driven (x-data open/dismiss) htmx swap target
# whose positioning/behaviour is wired against the <div>; a native <dialog>
# migration is tracked separately and would change the JS + functional tests.
#
# Web:S6819 on _card_household.html.twig is the clickable transaction-history
# member row: a <tr> cannot be replaced by a <button> (table semantics), so it
# uses the established role="button" + tabindex="0" + keydown handler pattern.
#
# php:S1448 ("too many methods") on InventoryItem is the inventory aggregate
# root. Its 30+ methods are intention-revealing domain behaviour: stock receipt,
# FIFO consume, LIFO return, and inter-facility transfer over a Doctrine-mapped
# one-to-many batch collection that must live on the entity, plus the optimistic
# -lock version accessor and the per-attribute update mutators. The stock API is
# called from 100+ sites across the Inventory context. Extracting it into a
# separate object would either require splitting Stock into its own aggregate
# (new repository + eventual consistency, a dedicated follow-up) or push the
# behaviour into anemic services — which the project's DDD rules forbid. The
# incidental helpers that COULD move (null-safe equality) were extracted to the
# NullSafeEquality trait; what remains is irreducible aggregate behaviour. The
# other five S1448 sites in this sprint were genuinely refactored (LRA-114).
sonar.issue.ignore.multicriteria=contract-test-trait,nav-aria-menubar,nav-aria-menubar-tag,modal-dialog-role,clickable-row-role,inventory-item-aggregate
sonar.issue.ignore.multicriteria.contract-test-trait.ruleKey=php:S2187
sonar.issue.ignore.multicriteria.contract-test-trait.resourceKey=tests/**/*ContractTest.php

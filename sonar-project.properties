sonar.projectKey=LiteRec_literec-admin-php
sonar.organization=literec

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

sonar.php.coverage.reportPaths=

# Copy-paste detection exclusions.
#
# Genuinely reusable domain primitives (EmailAddress, PhoneNumber) live
# in the SharedDomain kernel under src/Shared/Domain/ValueObject/ and
# are consumed by every bounded context that needs them, so they do
# not produce cross-context CPD hits in the first place.
#
# Doctrine migrations remain excluded because the up()/down() table
# definitions are inherently boilerplate that CPD flags but adds no
# real abstraction opportunity.
sonar.cpd.exclusions=\
  migrations/**

# Whole-file exclusions. Migrations live outside sonar.sources but
# SonarCloud's autoscan still pulls them into the new-code window
# unless explicitly excluded — the boilerplate up()/down() shape
# would otherwise trip the new_duplicated_lines_density quality
# gate every time a new migration mirrors an earlier one.
# Pattern uses **/*.php (rather than just **) because SonarCloud
# autoscan only applies sonar.exclusions to language-detected
# files; an extensionless glob is silently ignored.
sonar.exclusions=\
  migrations/**/*.php,\
  migrations/*.php

# Per-rule issue exclusions.
#
# php:S2187 ("Add some tests to this class") fires on the repository
# *ContractTest classes because their #[Test] methods are provided by a
# shared *ContractCases trait (tests/Support/Trait/), not declared inline.
# Each contract trait is deliberately composed by two concrete classes —
# the InMemory adapter test (Unit) and the Doctrine adapter test
# (Integration) — so a single behavioural contract is verified against
# every implementation of the port. SonarCloud's PHP analyzer does not
# resolve trait-provided test methods, so it sees an "empty" test class.
# The tests are real and run in CI; suppress the false positive on the
# contract-test files only.
sonar.issue.ignore.multicriteria=contract-test-trait
sonar.issue.ignore.multicriteria.contract-test-trait.ruleKey=php:S2187
sonar.issue.ignore.multicriteria.contract-test-trait.resourceKey=tests/**/*ContractTest.php

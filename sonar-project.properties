# Copy-paste detection exclusions.
#
# Genuinely reusable domain primitives (EmailAddress, PhoneNumber) live
# in the SharedDomain kernel under src/Shared/Domain/ValueObject/ and
# are consumed by every bounded context that needs them, so they do
# not produce cross-context CPD hits in the first place.
#
# Doctrine migrations remain excluded because the up()/down() table
# definitions are inherently boilerplate that CPD flags but adds no
# real abstraction opportunity.
#
# Per-context Doctrine custom types that wrap a published-language VO
# from another bounded context (currently only Catalog's ListingId,
# exported via the CatalogPublishedLanguage Deptrac layer) are
# intentionally duplicated: the no-share rule forbids reusing the
# Catalog adapter's type from Inventory, and the type body is a thin
# 40-line transport wrapper with no abstraction opportunity. The
# alternative — making one context's infrastructure depend on
# another's — would re-introduce exactly the coupling the no-share
# rule prevents.
sonar.cpd.exclusions=migrations/**,src/Inventory/Infrastructure/Persistence/Doctrine/Type/ListingIdType.php

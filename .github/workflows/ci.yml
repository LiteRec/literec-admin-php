name: CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel superseded PR runs, but let every push to main run to completion so
  # each merged commit gets a verified build.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Static analysis never touches the database. cache:warmup (run by
    # `composer stan`) compiles the container but does not connect: there are no
    # custom cache warmers, and the serverVersion pin below suppresses Doctrine's
    # version-detection connection. So no postgres service is started here.
    env:
      DATABASE_URL: 'postgresql://app:!ChangeMe!@127.0.0.1:5432/app?serverVersion=17&charset=utf8'

    strategy:
      # Report every tool's result in one run instead of stopping on the first
      # failure (the previous single-job chain hid downstream results).
      fail-fast: false
      matrix:
        include:
          - name: PHPCS (PSR-12)
            run: composer cs
          - name: PHPStan (level 9)
            run: composer stan
          - name: Deptrac (architecture)
            # Invokes the binary directly (rather than `composer deptrac`) so we
            # can pass --formatter=github-actions for inline PR annotations.
            run: vendor/bin/deptrac analyse --no-progress --formatter=github-actions

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up app
        uses: ./.github/actions/setup-app

      - name: ${{ matrix.name }}
        run: ${{ matrix.run }}

  tests:
    name: PHPUnit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: '!ChangeMe!'
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Override the .env DATABASE_URL so the migrations and tests target
      # the postgres:17 service container above.
      DATABASE_URL: 'postgresql://app:!ChangeMe!@127.0.0.1:5432/app?serverVersion=17&charset=utf8'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up app
        uses: ./.github/actions/setup-app

      - name: Create the test database
        run: php bin/console --env=test doctrine:database:create --if-not-exists

      - name: Set up the test database schema
        run: php bin/console --env=test doctrine:migrations:migrate --no-interaction

      - name: PHPUnit
        run: composer test

  fixtures:
    name: Fixtures smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: '!ChangeMe!'
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: 'postgresql://app:!ChangeMe!@127.0.0.1:5432/app?serverVersion=17&charset=utf8'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up app
        uses: ./.github/actions/setup-app

      - name: db:reset-test (drop, create, migrate, load fixtures)
        run: composer db:reset-test

      - name: Run the slow-group fixture tests against the seeded DB
        run: composer test:slow

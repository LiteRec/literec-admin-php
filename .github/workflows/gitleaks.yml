name: Gitleaks

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    # Weekly full-history scan, Mondays 06:15 America/New_York (10:15 UTC EST / 11:15 UTC EDT).
    - cron: "15 10 * * 1"
  workflow_dispatch:

jobs:
  scan:
    name: Secret scan
    runs-on: ubuntu-latest

    env:
      GITLEAKS_VERSION: 8.30.1

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "Downloaded gitleaks v${GITLEAKS_VERSION}"
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan repository
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gitleaks detect \
              --source . \
              --log-opts="--no-merges ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              --redact \
              --verbose \
              --report-format sarif \
              --report-path gitleaks.sarif \
              --exit-code 1
          else
            gitleaks detect \
              --source . \
              --redact \
              --verbose \
              --report-format sarif \
              --report-path gitleaks.sarif \
              --exit-code 1
          fi

      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
          retention-days: 30

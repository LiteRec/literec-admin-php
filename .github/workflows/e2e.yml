name: E2E

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Advisory while the suite stabilises (LRA-161): the job reports results but
    # does not block merges yet. Promotion to a required check is a follow-up.
    continue-on-error: true

    services:
      postgres:
        image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: '!ChangeMe!'
          POSTGRES_DB: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # The managed PHP server and the seed/restore commands all read this. Point
      # it at the E2E lane (base name `app_e2e`); the test env appends the `_test`
      # suffix, so the suite runs against the physical `app_e2e_test` database
      # (LRA-176) — distinct from the dev database (`app`) and the
      # functional/integration rollback database (`app_test`).
      DATABASE_URL: 'postgresql://app:!ChangeMe!@127.0.0.1:5432/app_e2e?serverVersion=17&charset=utf8'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up app
        uses: ./.github/actions/setup-app

      - name: Build Tailwind CSS
        run: php bin/console tailwind:build

      # The ephemeral postgres service starts with only the `app` database, so
      # provision the E2E lane database first — the CI analog of the persistent
      # lane provisioned in LRA-176. (app:seed:e2e introspects the connection to
      # guard the lane before it can create the database, so the database must
      # already exist when it runs.) This mirrors the "Create the test database"
      # step in the PHPUnit job of ci.yml.
      - name: Provision the E2E database
        run: php bin/console --env=test doctrine:database:create --if-not-exists

      # Seed once (migrate forward + load fixtures + capture a template
      # snapshot), then restore from that snapshot so the suite runs against the
      # fast restore path — the same path used to reset state locally between
      # runs (LRA-177) — rather than the slow per-fixture command dispatch of
      # `composer db:reset-test`. The commands are invoked directly (not via the
      # `composer seed:e2e`/`reset:e2e` wrappers, whose `@putenv` hardcodes a
      # local URL) so they inherit the job's DATABASE_URL — the single source of
      # truth shared with the managed PHP server below. Snapshot/restore uses
      # Postgres TEMPLATE databases through the PHP pdo_pgsql driver, so no
      # psql/pg_dump client tools are needed on the runner.
      - name: Seed the E2E database and capture a snapshot
        run: php bin/console --env=test app:seed:e2e

      - name: Restore the E2E database from the snapshot
        run: php bin/console --env=test app:reset:e2e

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E (headless)
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

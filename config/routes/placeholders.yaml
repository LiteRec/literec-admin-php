# yaml-language-server: $schema=../../vendor/symfony/routing/Loader/schema/routing.schema.json
#
# Placeholder "coming soon" destinations. Every nav target that does not yet
# have a real controller maps here: one route per entry, all dispatched to the
# single invokable App\Controller\PlaceholderController, which renders the
# shared stub using the per-route `sectionTitle` default. Route names use the
# ubiquitous staff/admin language (e.g. membership_cards_index) so a feature can
# later swap its entry for a dedicated controller without rewiring nav links.
#
# The Inventory list page (route name `inventory_index`, /admin/inventory) is
# served by App\Inventory\Infrastructure\Http\Controller\ListInventoryController
# (LRA-85); its placeholder entry was removed when the real controller landed.


# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Mock selected-facility indicator shown in the authenticated app shell
    # header. Will be driven by the user's actual facility selection once the
    # Facilities context lands; until then the shell needs a concrete value.
    app.selected_facility_mock: 'Main Facility'
    # Hide the "Export Duplicates" action on the View Members page until the
    # downstream report exists. The button is rendered only when this flag is
    # true so the page does not advertise a feature operators cannot use.
    app.users_export_duplicates_enabled: false
    # Build version surfaced in the app shell footer. Defaults to "dev" so
    # locally-run instances still render something; CI/CD provides the real
    # version via the APP_BUILD_VERSION environment variable.
    app.build_version: '%env(default:default_build_version:string:APP_BUILD_VERSION)%'
    default_build_version: 'dev'
    # Default Faker seed for fixture loads. Override via FIXTURE_SEED env
    # to switch to a different but still stable dataset.
    default_fixture_seed: 1

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Users/Domain/User.php'
            - '../src/Users/Domain/Event/'
            - '../src/Users/Domain/Exception/'
            - '../src/Users/Domain/ValueObject/'
            - '../src/Users/Domain/AggregateRoot.php'
            - '../src/Users/Application/Command/RegisterUser.php'
            - '../src/Users/Application/Command/ChangeUserPassword.php'
            - '../src/Users/Infrastructure/Persistence/Doctrine/Type/'
            - '../src/Households/Infrastructure/Persistence/Doctrine/Type/'
            - '../src/Households/Domain/Household.php'
            - '../src/Households/Domain/HouseholdMember.php'
            - '../src/Households/Domain/Event/'
            - '../src/Households/Domain/Exception/'
            - '../src/Households/Domain/ValueObject/'
            - '../src/Households/Domain/AggregateRoot.php'
            - '../src/Households/Application/Command/RegisterHousehold.php'
            - '../src/Households/Application/Command/AddMemberToHousehold.php'
            - '../src/Households/Application/Command/UpdateMemberProfile.php'
            - '../src/Households/Application/Command/UpdateHouseholdAddress.php'
            - '../src/Households/Application/Command/ChangeMemberResidency.php'
            - '../src/Households/Application/Command/DeactivateMember.php'
            - '../src/Households/Application/Query/Port/'
            - '../src/Households/Application/Query/SearchMembers.php'
            - '../src/Households/Application/Query/GetMemberDetail.php'
            # LRA-45: Application/Port carries the read-side ACL port for
            # member transaction history and its DTO/enum types. The port
            # interface is bound explicitly below; the DTOs must not be
            # auto-registered as services.
            - '../src/Households/Application/Port/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Bind the Users\Domain IdentityGenerator port to its UUID v7 adapter.
    App\Users\Domain\IdentityGenerator: '@App\Users\Infrastructure\Identity\Uuid7IdentityGenerator'

    # Bind the Users\Domain Users repository port to its Doctrine adapter.
    App\Users\Domain\Users: '@App\Users\Infrastructure\Persistence\Doctrine\DoctrineUsers'

    # Bind the Households\Domain ports to their production adapters.
    # UUID v7 generation is provided by the Uuid7IdentityGenerator; the
    # repository and member-code allocator are backed by Doctrine and
    # Postgres respectively (LRA-37). In-memory adapters remain wired
    # behind named aliases under when@test for contract tests.
    App\Households\Domain\IdentityGenerator: '@App\Households\Infrastructure\Identity\Uuid7IdentityGenerator'
    App\Households\Domain\Households: '@App\Households\Infrastructure\Persistence\Doctrine\DoctrineHouseholds'
    App\Households\Domain\MemberCodeAllocator: '@App\Households\Infrastructure\Persistence\Doctrine\DoctrineMemberCodeAllocator'

    # Bind the Households read-model port (LRA-38) to its Doctrine adapter.
    # The adapter uses the DBAL Connection rather than the EntityManager;
    # read paths never pay UnitOfWork costs and the projection shape can
    # evolve independently of the aggregate.
    App\Households\Application\Query\Port\MemberReadModel: '@App\Households\Infrastructure\Persistence\Doctrine\Read\DoctrineMemberReadModel'

    # LRA-45: bind the read-side ACL port for member transaction history
    # to the stub adapter. The real Transactions bounded context does not
    # exist yet; when it lands, a future ticket will replace this binding
    # with the production adapter without touching the controller or
    # template that consume the port.
    App\Households\Application\Port\MemberTransactionHistory: '@App\Households\Infrastructure\Acl\Stub\StubMemberTransactionHistory'

    # Inject the command bus into the SecurityUserProvider so the password
    # upgrader can dispatch a ChangeUserPassword command.
    App\Users\Infrastructure\Security\SecurityUserProvider:
        arguments:
            $commandBus: '@command.bus'

    # Wire the SearchMembersController (LRA-39) onto the query bus so its
    # GET actions can dispatch the SearchMembers query, and pass the
    # export-duplicates feature flag through as a constructor arg.
    App\Households\Infrastructure\Http\Controller\SearchMembersController:
        arguments:
            $queryBus: '@query.bus'
            $exportDuplicatesEnabled: '%app.users_export_duplicates_enabled%'
        tags: ['controller.service_arguments']

    # Wire the AddHouseholdController (LRA-40) onto the command bus so its
    # POST actions can dispatch RegisterHousehold and AddMemberToHousehold.
    App\Households\Infrastructure\Http\Controller\AddHouseholdController:
        arguments:
            $commandBus: '@command.bus'
        tags: ['controller.service_arguments']

    # Wire the MemberLookupController (LRA-46) onto the query bus so its
    # GET action can dispatch the SearchMembers query for the reusable
    # Member Lookup dialog.
    App\Households\Infrastructure\Http\Controller\MemberLookupController:
        arguments:
            $queryBus: '@query.bus'
        tags: ['controller.service_arguments']

    # Wire the MemberDetailController (LRA-41 + LRA-43) onto both the query
    # bus (GetMemberDetail) and the command bus (UpdateMemberProfile for the
    # in-card Profile edit flow). The MemberTransactionHistory port (LRA-45)
    # is autowired by interface and resolves to the Stub adapter via the
    # binding above.
    App\Households\Infrastructure\Http\Controller\MemberDetailController:
        arguments:
            $queryBus: '@query.bus'
            $commandBus: '@command.bus'
        tags: ['controller.service_arguments']

    # App shell Twig globals (selected facility, build version).
    App\Ui\Twig\AppShellExtension:
        arguments:
            $selectedFacility: '%app.selected_facility_mock%'
            $buildVersion: '%app.build_version%'

# Expose select context aliases to the test container so integration tests
# can fetch them via static::getContainer()->get(...) without making them
# public in production. The Households repository, member-code allocator,
# and read model all resolve to the Doctrine adapters (DAMA wraps each
# write-path test in a transaction); the InMemory adapters are still
# wired behind named aliases (households.in_memory_*) so the shared
# contract tests can target them deliberately.
when@test:
    services:
        App\Users\Domain\IdentityGenerator:
            alias: App\Users\Infrastructure\Identity\Uuid7IdentityGenerator
            public: true
        App\Users\Domain\Users:
            alias: App\Users\Infrastructure\Persistence\Doctrine\DoctrineUsers
            public: true
        App\Households\Domain\IdentityGenerator:
            alias: App\Households\Infrastructure\Identity\Uuid7IdentityGenerator
            public: true
        App\Households\Domain\Households:
            alias: App\Households\Infrastructure\Persistence\Doctrine\DoctrineHouseholds
            public: true
        App\Households\Domain\MemberCodeAllocator:
            alias: App\Households\Infrastructure\Persistence\Doctrine\DoctrineMemberCodeAllocator
            public: true
        households.in_memory_repository:
            alias: App\Households\Infrastructure\Persistence\InMemory\InMemoryHouseholds
            public: true
        households.in_memory_member_code_allocator:
            alias: App\Households\Infrastructure\Persistence\InMemory\InMemoryMemberCodeAllocator
            public: true
        App\Households\Application\Query\Port\MemberReadModel:
            alias: App\Households\Infrastructure\Persistence\Doctrine\Read\DoctrineMemberReadModel
            public: true
        households.in_memory_read_model:
            alias: App\Households\Infrastructure\Persistence\InMemory\InMemoryMemberReadModel
            public: true
        App\Households\Application\Port\MemberTransactionHistory:
            alias: App\Households\Infrastructure\Acl\Stub\StubMemberTransactionHistory
            public: true
        # Seeded Faker generator for fixture loads. Test env mirrors the
        # dev binding below so integration tests that exercise fixtures
        # see identical output.
        Faker\Generator:
            factory: ['App\Users\Infrastructure\Fixtures\SeededFakerFactory', 'create']
            arguments:
                $seed: '%env(int:default:default_fixture_seed:FIXTURE_SEED)%'

when@dev:
    services:
        # Seeded Faker generator for fixture loads in the dev env.
        Faker\Generator:
            factory: ['App\Users\Infrastructure\Fixtures\SeededFakerFactory', 'create']
            arguments:
                $seed: '%env(int:default:default_fixture_seed:FIXTURE_SEED)%'

# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Mock selected-facility indicator shown in the authenticated app shell
    # header. Will be driven by the user's actual facility selection once the
    # Facilities context lands; until then the shell needs a concrete value.
    app.selected_facility_mock: 'Main Facility'
    # Build version surfaced in the app shell footer. Defaults to "dev" so
    # locally-run instances still render something; CI/CD provides the real
    # version via the APP_BUILD_VERSION environment variable.
    app.build_version: '%env(default:default_build_version:string:APP_BUILD_VERSION)%'
    default_build_version: 'dev'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Users/Domain/User.php'
            - '../src/Users/Domain/Event/'
            - '../src/Users/Domain/Exception/'
            - '../src/Users/Domain/ValueObject/'
            - '../src/Users/Domain/AggregateRoot.php'
            - '../src/Users/Application/Command/RegisterUser.php'
            - '../src/Users/Application/Command/ChangeUserPassword.php'
            - '../src/Users/Infrastructure/Persistence/Doctrine/Type/'
            - '../src/Households/Domain/Household.php'
            - '../src/Households/Domain/HouseholdMember.php'
            - '../src/Households/Domain/Event/'
            - '../src/Households/Domain/Exception/'
            - '../src/Households/Domain/ValueObject/'
            - '../src/Households/Domain/AggregateRoot.php'
            - '../src/Households/Application/Command/RegisterHousehold.php'
            - '../src/Households/Application/Command/AddMemberToHousehold.php'
            - '../src/Households/Application/Command/UpdateMemberProfile.php'
            - '../src/Households/Application/Command/UpdateHouseholdAddress.php'
            - '../src/Households/Application/Command/ChangeMemberResidency.php'
            - '../src/Households/Application/Command/DeactivateMember.php'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Bind the Users\Domain IdentityGenerator port to its UUID v7 adapter.
    App\Users\Domain\IdentityGenerator: '@App\Users\Infrastructure\Identity\Uuid7IdentityGenerator'

    # Bind the Users\Domain Users repository port to its Doctrine adapter.
    App\Users\Domain\Users: '@App\Users\Infrastructure\Persistence\Doctrine\DoctrineUsers'

    # Bind the Households\Domain ports to their adapters. The persistence
    # port currently resolves to the in-memory adapter; LRA-37 introduces
    # the Doctrine implementations.
    App\Households\Domain\Households: '@App\Households\Infrastructure\Persistence\InMemory\InMemoryHouseholds'
    App\Households\Domain\IdentityGenerator: '@App\Households\Infrastructure\Identity\Uuid7IdentityGenerator'
    App\Households\Domain\MemberCodeAllocator: '@App\Households\Infrastructure\Persistence\InMemory\InMemoryMemberCodeAllocator'

    # Inject the command bus into the SecurityUserProvider so the password
    # upgrader can dispatch a ChangeUserPassword command.
    App\Users\Infrastructure\Security\SecurityUserProvider:
        arguments:
            $commandBus: '@command.bus'

    # App shell Twig globals (selected facility, build version).
    App\Ui\Twig\AppShellExtension:
        arguments:
            $selectedFacility: '%app.selected_facility_mock%'
            $buildVersion: '%app.build_version%'

# Expose select Users-context aliases to the test container so integration
# tests can fetch them via static::getContainer()->get(...) without making
# them public in production.
when@test:
    services:
        App\Users\Domain\IdentityGenerator:
            alias: App\Users\Infrastructure\Identity\Uuid7IdentityGenerator
            public: true
        App\Users\Domain\Users:
            alias: App\Users\Infrastructure\Persistence\Doctrine\DoctrineUsers
            public: true
        App\Households\Domain\Households:
            alias: App\Households\Infrastructure\Persistence\InMemory\InMemoryHouseholds
            public: true
        App\Households\Domain\IdentityGenerator:
            alias: App\Households\Infrastructure\Identity\Uuid7IdentityGenerator
            public: true
        App\Households\Domain\MemberCodeAllocator:
            alias: App\Households\Infrastructure\Persistence\InMemory\InMemoryMemberCodeAllocator
            public: true

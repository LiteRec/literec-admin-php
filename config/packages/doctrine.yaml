doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'

        # Custom DBAL types for the Users bounded-context value objects.
        types:
            users_user_id: App\Users\Infrastructure\Persistence\Doctrine\Type\UserIdType
            users_username: App\Users\Infrastructure\Persistence\Doctrine\Type\UsernameType
            users_hashed_password: App\Users\Infrastructure\Persistence\Doctrine\Type\HashedPasswordType
            users_roles: App\Users\Infrastructure\Persistence\Doctrine\Type\RolesType
            # Custom DBAL types for the Households bounded-context value objects.
            households_household_id: App\Households\Infrastructure\Persistence\Doctrine\Type\HouseholdIdType
            households_member_id: App\Households\Infrastructure\Persistence\Doctrine\Type\MemberIdType
            households_household_name: App\Households\Infrastructure\Persistence\Doctrine\Type\HouseholdNameType
            households_member_code: App\Households\Infrastructure\Persistence\Doctrine\Type\MemberCodeType
            households_email_address: App\Households\Infrastructure\Persistence\Doctrine\Type\EmailAddressType
            households_phone_number: App\Households\Infrastructure\Persistence\Doctrine\Type\PhoneNumberType
            households_date_of_birth: App\Households\Infrastructure\Persistence\Doctrine\Type\DateOfBirthType
            # Custom DBAL types for the Catalog bounded-context value objects.
            catalog_listing_id: App\Catalog\Infrastructure\Persistence\Doctrine\Type\ListingIdType
            catalog_listing_code: App\Catalog\Infrastructure\Persistence\Doctrine\Type\ListingCodeType
            catalog_listing_kind: App\Catalog\Infrastructure\Persistence\Doctrine\Type\ListingKindType
            catalog_ledger_account: App\Catalog\Infrastructure\Persistence\Doctrine\Type\LedgerAccountType
            catalog_tax_treatment: App\Catalog\Infrastructure\Persistence\Doctrine\Type\TaxTreatmentType
            catalog_fees: App\Catalog\Infrastructure\Persistence\Doctrine\Type\FeesType
            # Custom DBAL types for the Inventory bounded-context value objects.
            inventory_vendor_id: App\Inventory\Infrastructure\Persistence\Doctrine\Type\VendorIdType
            inventory_vendor_code: App\Inventory\Infrastructure\Persistence\Doctrine\Type\VendorCodeType
            inventory_vendor_name: App\Inventory\Infrastructure\Persistence\Doctrine\Type\VendorNameType
            inventory_vendor_contact: App\Inventory\Infrastructure\Persistence\Doctrine\Type\VendorContactType
            inventory_vendor_address: App\Inventory\Infrastructure\Persistence\Doctrine\Type\VendorAddressType
            inventory_email_address: App\Inventory\Infrastructure\Persistence\Doctrine\Type\EmailAddressType
            inventory_phone_number: App\Inventory\Infrastructure\Persistence\Doctrine\Type\PhoneNumberType
            inventory_item_id: App\Inventory\Infrastructure\Persistence\Doctrine\Type\InventoryItemIdType
            inventory_stock_batch_id: App\Inventory\Infrastructure\Persistence\Doctrine\Type\StockBatchIdType
            inventory_purchase_order_line_id: App\Inventory\Infrastructure\Persistence\Doctrine\Type\PurchaseOrderLineIdType
            inventory_facility_code: App\Inventory\Infrastructure\Persistence\Doctrine\Type\FacilityCodeType
            inventory_pos_color: App\Inventory\Infrastructure\Persistence\Doctrine\Type\PosColorType
            inventory_reorder_threshold: App\Inventory\Infrastructure\Persistence\Doctrine\Type\ReorderThresholdType
            inventory_quantity: App\Inventory\Infrastructure\Persistence\Doctrine\Type\QuantityType
            inventory_cost_per_unit: App\Inventory\Infrastructure\Persistence\Doctrine\Type\CostPerUnitType
            inventory_comment: App\Inventory\Infrastructure\Persistence\Doctrine\Type\CommentType
            inventory_purchase_order_id: App\Inventory\Infrastructure\Persistence\Doctrine\Type\PurchaseOrderIdType
            inventory_item_link_id: App\Inventory\Infrastructure\Persistence\Doctrine\Type\ItemLinkIdType
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            Users:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Users/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'App\Users\Domain'
                alias: Users
            Households:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Households/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'App\Households\Domain'
                alias: Households
            Catalog:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Catalog/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'App\Catalog\Domain'
                alias: Catalog
            Inventory:
                type: xml
                is_bundle: false
                dir: '%kernel.project_dir%/src/Inventory/Infrastructure/Persistence/Doctrine/Mapping'
                prefix: 'App\Inventory\Domain'
                alias: Inventory

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system

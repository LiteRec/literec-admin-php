security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        # The custom SecurityUser adapter implements PasswordAuthenticatedUserInterface,
        # so the interface entry still covers the firewall-side hashing.
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        # Named hasher referenced by App\Users\Application\Command\RegisterUserHandler
        # via PasswordHasherFactoryInterface->getPasswordHasher('users').
        users: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        # LRA-21: load users via the SecurityUserProvider, which delegates
        # to the App\Users\Domain\Users port rather than coupling to a
        # specific entity class.
        app_user_provider:
            id: App\Users\Infrastructure\Security\SecurityUserProvider

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed.
            # 'assets/' covers AssetMapper, which this project uses.
            pattern: ^/(_profiler|_wdt|assets)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Users\Infrastructure\Security\UserChecker

            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                default_target_path: app_dashboard

            logout:
                path: app_logout
                enable_csrf: true

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/health$, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
            users:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10

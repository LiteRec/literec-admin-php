framework:
    messenger:
        failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'
            # sync: 'sync://'

        default_bus: command.bus

        # LRA-20: multi-bus setup. The command bus runs every handler inside
        # a Doctrine transaction; combined with DispatchAfterCurrentBusStamp
        # on aggregate event dispatches, domain events fire only after the
        # write transaction commits.
        buses:
            command.bus:
                middleware:
                    - validation
                    - doctrine_transaction
            event.bus:
                default_middleware: allow_no_handlers
                middleware:
                    - validation
            query.bus:
                middleware:
                    - validation

        routing:
            Symfony\Component\Mailer\Messenger\SendEmailMessage: async
            Symfony\Component\Notifier\Message\ChatMessage: async
            Symfony\Component\Notifier\Message\SmsMessage: async

            # LRA-69: route the Catalog LineSold integration event to the
            # async transport so downstream subscribers (Inventory, future
            # Programs / Memberships / Rentals) run out-of-band after the
            # writing transaction commits. The producer publishes the
            # event via the event.bus with DispatchAfterCurrentBusStamp;
            # the command.bus doctrine_transaction middleware enforces
            # post-commit dispatch.
            App\Catalog\Integration\Event\LineSold: async

when@test:
    framework:
        messenger:
            transports:
                # LRA-69: in-memory transport so the functional contract
                # test for the LineSold post-commit guarantee can assert
                # whether the event was actually published without
                # depending on the real broker.
                async: 'in-memory://'

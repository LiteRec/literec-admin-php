deptrac:
    paths:
        - ./src
    exclude_files:
        - '#.*/tests/.*#'
    layers:
        - name: UsersDomain
          collectors:
              - type: directory
                value: src/Users/Domain/.*
        - name: UsersApplication
          collectors:
              - type: directory
                value: src/Users/Application/.*
        - name: UsersInfrastructure
          collectors:
              - type: directory
                value: src/Users/Infrastructure/.*
        - name: HouseholdsDomain
          collectors:
              - type: directory
                value: src/Households/Domain/.*
        - name: HouseholdsApplication
          collectors:
              - type: directory
                value: src/Households/Application/.*
        - name: HouseholdsInfrastructure
          collectors:
              - type: directory
                value: src/Households/Infrastructure/.*
        - name: CatalogDomain
          collectors:
              - type: directory
                value: src/Catalog/Domain/.*
        - name: CatalogApplication
          collectors:
              - type: directory
                value: src/Catalog/Application/.*
        - name: CatalogInfrastructure
          collectors:
              - type: directory
                value: src/Catalog/Infrastructure/.*
        - name: CatalogIntegration
          collectors:
              # Published-language DTOs other contexts subscribe to.
              # Must remain free of any framework or infrastructure imports
              # so consumers can reference them without pulling Catalog
              # internals.
              - type: directory
                value: src/Catalog/Integration/.*
        - name: Legacy
          collectors:
              # Two non-Users root controllers remain at src/Controller/ awaiting
              # reassignment to their proper bounded contexts (Reports, Scheduling).
              # All other legacy paths were removed by LRA-13.
              - type: directory
                value: src/Controller/.*
        - name: Ui
          collectors:
              # Cross-cutting UI infrastructure: app-shell Twig globals,
              # navigation, dashboard view-models, reusable components.
              # Not a bounded context — pure presentation glue for staff
              # admin pages.
              - type: directory
                value: src/Ui/.*
        - name: SharedInfrastructure
          collectors:
              # Cross-cutting infrastructure helpers consumed by multiple
              # bounded contexts (e.g. fixture env readers). Lives outside
              # any context so its imports do not violate the "no
              # cross-context dependencies" rule.
              - type: directory
                value: src/Shared/Infrastructure/.*

        # External-code layers are matched by namespace prefix rather than by
        # composer package list. This avoids depending on the exact direct/transitive
        # package split in composer.json: any class under the listed namespaces
        # is treated as belonging to that layer regardless of which composer
        # package ships it.
        - name: PsrClock
          collectors:
              - type: classLike
                value: ^Psr\\Clock\\.*
        - name: SymfonyMessenger
          collectors:
              - type: classLike
                value: ^Symfony\\Component\\Messenger\\.*
        - name: SymfonyPasswordHasher
          collectors:
              - type: classLike
                value: ^Symfony\\Component\\PasswordHasher\\.*
        - name: DoctrineCollections
          collectors:
              - type: classLike
                value: ^Doctrine\\Common\\Collections\\.*
        - name: Doctrine
          collectors:
              - type: bool
                must:
                    - type: classLike
                      value: ^Doctrine\\.*
                must_not:
                    - type: layer
                      value: DoctrineCollections
        - name: Twig
          collectors:
              - type: classLike
                value: ^Twig\\.*
        - name: Faker
          collectors:
              - type: classLike
                value: ^Faker\\.*
        - name: Symfony
          collectors:
              - type: bool
                must:
                    - type: classLike
                      value: ^Symfony\\.*
                must_not:
                    - type: layer
                      value: SymfonyMessenger
                    - type: layer
                      value: SymfonyPasswordHasher
    ruleset:
        UsersDomain:
            - PsrClock
        UsersApplication:
            - UsersDomain
            - SymfonyMessenger
            - SymfonyPasswordHasher
            - PsrClock
        UsersInfrastructure:
            - UsersDomain
            - UsersApplication
            - SymfonyMessenger
            - SymfonyPasswordHasher
            - PsrClock
            - Doctrine
            - DoctrineCollections
            - Symfony
            - Faker
            - SharedInfrastructure
        # Households layers. Cross-context dependencies are forbidden:
        # HouseholdsDomain and UsersDomain are independent of each other.
        # Doctrine\Common\Collections is the one ORM dependency the
        # domain is allowed to import: the aggregate root holds its
        # child entities in a typed Collection so the Doctrine
        # one-to-many mapping can track changes. The library is
        # intentionally framework-free and is considered a domain
        # primitive on par with the SPL collection types.
        HouseholdsDomain:
            - PsrClock
            - DoctrineCollections
        HouseholdsApplication:
            - HouseholdsDomain
            - SymfonyMessenger
            - PsrClock
        HouseholdsInfrastructure:
            - HouseholdsDomain
            - HouseholdsApplication
            - SymfonyMessenger
            - PsrClock
            - Doctrine
            - DoctrineCollections
            - Symfony
            - Faker
            - SharedInfrastructure
        # Catalog layers. CatalogDomain is framework-free and owns the
        # cross-cutting "sellable thing" concept (Listing aggregate, fees,
        # tax treatment, GL account). CatalogIntegration holds the
        # published-language DTOs other contexts subscribe to and depends
        # on nothing — consumers reference these without pulling Catalog
        # internals.
        CatalogDomain:
            - PsrClock
        CatalogApplication:
            - CatalogDomain
            - SymfonyMessenger
            - PsrClock
        CatalogInfrastructure:
            - CatalogDomain
            - CatalogApplication
            - CatalogIntegration
            - SymfonyMessenger
            - PsrClock
            - Doctrine
            - DoctrineCollections
            - Symfony
            - Faker
            - SharedInfrastructure
        CatalogIntegration: []
        # Legacy now covers only the two root controllers
        # (HomeController, DashboardController) that LRA-13 left in place
        # because they belong to bounded contexts (Reports, Scheduling)
        # that have not yet been introduced. The permissive ruleset will
        # shrink further (or the layer will be removed entirely) once
        # those contexts exist and the controllers move under them.
        Legacy:
            - Legacy
            - Ui
            - Doctrine
            - DoctrineCollections
            - Symfony
            - SymfonyPasswordHasher
            - SymfonyMessenger
            - PsrClock
        Ui:
            - Ui
            - Symfony
            - Twig
            - PsrClock
        SharedInfrastructure: []

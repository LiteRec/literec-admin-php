deptrac:
    paths:
        - ./src
    exclude_files:
        - '#.*/tests/.*#'
    layers:
        - name: UsersDomain
          collectors:
              - type: directory
                value: src/Users/Domain/.*
        - name: UsersApplication
          collectors:
              - type: directory
                value: src/Users/Application/.*
        - name: UsersInfrastructure
          collectors:
              - type: directory
                value: src/Users/Infrastructure/.*
        - name: HouseholdsDomain
          collectors:
              - type: directory
                value: src/Households/Domain/.*
        - name: HouseholdsApplication
          collectors:
              - type: directory
                value: src/Households/Application/.*
        - name: HouseholdsInfrastructure
          collectors:
              - type: directory
                value: src/Households/Infrastructure/.*
        - name: CatalogPublishedLanguage
          collectors:
              # Narrow published-language subset of Catalog\Domain that
              # downstream contexts (currently Inventory) are allowed to
              # import directly. Distinct from CatalogIntegration (the
              # integration-event namespace) so consumers can name the
              # cross-context value objects without pulling in the rest
              # of Catalog\Domain. The CatalogDomain collector below
              # subtracts these types via a bool/must_not layer
              # reference so each class belongs to exactly one layer.
              # InvalidListingId is included because it is part of the
              # ListingId construction contract — consumers that build
              # a ListingId from a string must be able to name the
              # exception type. Every addition to this layer expands
              # the cross-context API surface; keep the list short.
              - type: classLike
                value: '^App\\Catalog\\Domain\\ValueObject\\ListingId$'
              - type: classLike
                value: '^App\\Catalog\\Domain\\ListingKind$'
              - type: classLike
                value: '^App\\Catalog\\Domain\\Exception\\InvalidListingId$'
        - name: CatalogDomain
          collectors:
              # Everything under Catalog\Domain except the published-language
              # types exported via CatalogPublishedLanguage above.
              - type: bool
                must:
                    - type: directory
                      value: src/Catalog/Domain/.*
                must_not:
                    - type: layer
                      value: CatalogPublishedLanguage
        - name: CatalogApplication
          collectors:
              # Everything under Catalog\Application except the
              # cross-bus commands explicitly published for downstream
              # contexts via CatalogCrossBusCommands and the narrow
              # query DTOs/view types exported via
              # CatalogCrossContextQueries. Without these subtractions
              # the published types would belong to two layers and
              # deptrac's match-once-then-stop semantics could route
              # the dependency through CatalogApplication instead of
              # the narrow whitelist.
              - type: bool
                must:
                    - type: directory
                      value: src/Catalog/Application/.*
                must_not:
                    - type: layer
                      value: CatalogCrossBusCommands
                    - type: layer
                      value: CatalogCrossContextQueries
        - name: CatalogCrossContextQueries
          collectors:
              # Narrow allow-list of Catalog read-side DTOs that
              # downstream contexts may import. LRA-86 needs
              # GetListingDetail + its view types so the Inventory
              # Edit Item dialog can pre-fill name/code/fees/ledger
              # from the Catalog Listing. New entries here require
              # deliberate review — same contract as
              # CatalogCrossBusCommands.
              - type: classLike
                value: '^App\\Catalog\\Application\\Query\\GetListingDetail$'
              - type: classLike
                value: '^App\\Catalog\\Application\\Query\\View\\ListingDetailView$'
              - type: classLike
                value: '^App\\Catalog\\Application\\Query\\View\\FeeView$'
        - name: CatalogCrossBusCommands
          collectors:
              # Narrow allow-list of Catalog command DTOs that
              # downstream contexts may import directly.
              # LRA-98 added RegisterListing for the cross-bus
              # RegisterInventoryItem orchestration. LRA-86 added the
              # four Listing update DTOs so the Edit Inventory Item
              # controller can dispatch each Catalog-side change
              # independently from the Inventory-side update.
              # New entries here require deliberate review — every
              # addition is a coupling surface across bounded
              # contexts. Patterns are anchored with $ so the
              # matching *Handler classes (which mutate the
              # aggregate) stay in CatalogApplication and keep
              # their access to CatalogDomain.
              - type: classLike
                value: '^App\\Catalog\\Application\\Command\\RegisterListing$'
              - type: classLike
                value: '^App\\Catalog\\Application\\Command\\RenameListing$'
              - type: classLike
                value: '^App\\Catalog\\Application\\Command\\UpdateListingFees$'
              - type: classLike
                value: '^App\\Catalog\\Application\\Command\\UpdateListingLedgerAccount$'
              - type: classLike
                value: '^App\\Catalog\\Application\\Command\\UpdateListingTaxTreatment$'
        - name: CatalogInfrastructure
          collectors:
              - type: directory
                value: src/Catalog/Infrastructure/.*
        - name: CatalogIntegration
          collectors:
              # Published-language DTOs other contexts subscribe to.
              # Must remain free of any framework or infrastructure imports
              # so consumers can reference them without pulling Catalog
              # internals.
              - type: directory
                value: src/Catalog/Integration/.*
        - name: InventoryDomain
          collectors:
              - type: directory
                value: src/Inventory/Domain/.*
        - name: InventoryApplication
          collectors:
              - type: directory
                value: src/Inventory/Application/.*
        - name: InventoryInfrastructure
          collectors:
              - type: directory
                value: src/Inventory/Infrastructure/.*
        - name: InventoryIntegration
          collectors:
              # Outbound Inventory published-language DTOs (introduced by
              # LRA-83's StockConsumptionFailed event). Same contract as
              # CatalogIntegration: pure DTOs, no framework imports.
              - type: directory
                value: src/Inventory/Integration/.*
        - name: Legacy
          collectors:
              # Two non-Users root controllers remain at src/Controller/ awaiting
              # reassignment to their proper bounded contexts (Reports, Scheduling).
              # All other legacy paths were removed by LRA-13.
              - type: directory
                value: src/Controller/.*
        - name: Ui
          collectors:
              # Cross-cutting UI infrastructure: app-shell Twig globals,
              # navigation, dashboard view-models, reusable components.
              # Not a bounded context — pure presentation glue for staff
              # admin pages.
              - type: directory
                value: src/Ui/.*
        - name: SharedDomain
          collectors:
              # Shared kernel: framework-free value objects and exceptions
              # that multiple bounded contexts genuinely need (EmailAddress,
              # PhoneNumber, ...). Each consuming context grants
              # SharedDomain access from its Domain and Application layers.
              # The shared marker SharedDomainException is the supertype of
              # every per-context domain-exception marker so HTTP listeners
              # still observe shared-kernel failures via the context
              # marker they catch.
              - type: directory
                value: src/Shared/Domain/.*
        - name: SharedInfrastructure
          collectors:
              # Cross-cutting infrastructure helpers consumed by multiple
              # bounded contexts (e.g. fixture env readers). Lives outside
              # any context so its imports do not violate the "no
              # cross-context dependencies" rule.
              - type: directory
                value: src/Shared/Infrastructure/.*

        # External-code layers are matched by namespace prefix rather than by
        # composer package list. This avoids depending on the exact direct/transitive
        # package split in composer.json: any class under the listed namespaces
        # is treated as belonging to that layer regardless of which composer
        # package ships it.
        - name: PsrClock
          collectors:
              - type: classLike
                value: ^Psr\\Clock\\.*
        - name: SymfonyMessenger
          collectors:
              - type: classLike
                value: ^Symfony\\Component\\Messenger\\.*
        - name: SymfonyPasswordHasher
          collectors:
              - type: classLike
                value: ^Symfony\\Component\\PasswordHasher\\.*
        - name: DoctrineCollections
          collectors:
              - type: classLike
                value: ^Doctrine\\Common\\Collections\\.*
        - name: Doctrine
          collectors:
              - type: bool
                must:
                    - type: classLike
                      value: ^Doctrine\\.*
                must_not:
                    - type: layer
                      value: DoctrineCollections
        - name: Twig
          collectors:
              - type: classLike
                value: ^Twig\\.*
        - name: Faker
          collectors:
              - type: classLike
                value: ^Faker\\.*
        - name: Picqer
          collectors:
              # picqer/php-barcode-generator. Allowed only inside
              # InventoryInfrastructure (the CODE128 renderer
              # adapter at src/Inventory/Infrastructure/Barcode/).
              # The Inventory Domain port BarcodeRenderer is what
              # Application and Domain code depend on.
              - type: classLike
                value: ^Picqer\\.*
        - name: Symfony
          collectors:
              - type: bool
                must:
                    - type: classLike
                      value: ^Symfony\\.*
                must_not:
                    - type: layer
                      value: SymfonyMessenger
                    - type: layer
                      value: SymfonyPasswordHasher
    ruleset:
        UsersDomain:
            - PsrClock
        UsersApplication:
            - UsersDomain
            - SymfonyMessenger
            - SymfonyPasswordHasher
            - PsrClock
        UsersInfrastructure:
            - UsersDomain
            - UsersApplication
            - SymfonyMessenger
            - SymfonyPasswordHasher
            - PsrClock
            - Doctrine
            - DoctrineCollections
            - Symfony
            - Faker
            - SharedInfrastructure
        # Households layers. Cross-context dependencies are forbidden:
        # HouseholdsDomain and UsersDomain are independent of each other.
        # Doctrine\Common\Collections is the one ORM dependency the
        # domain is allowed to import: the aggregate root holds its
        # child entities in a typed Collection so the Doctrine
        # one-to-many mapping can track changes. The library is
        # intentionally framework-free and is considered a domain
        # primitive on par with the SPL collection types.
        HouseholdsDomain:
            - PsrClock
            - DoctrineCollections
            - SharedDomain
        HouseholdsApplication:
            - HouseholdsDomain
            - SharedDomain
            - SymfonyMessenger
            - PsrClock
        HouseholdsInfrastructure:
            - HouseholdsDomain
            - HouseholdsApplication
            - SharedDomain
            - SymfonyMessenger
            - PsrClock
            - Doctrine
            - DoctrineCollections
            - Symfony
            - Faker
            - SharedInfrastructure
        # Catalog layers. CatalogDomain is framework-free and owns the
        # cross-cutting "sellable thing" concept (Listing aggregate, fees,
        # tax treatment, GL account). CatalogIntegration holds the
        # published-language DTOs other contexts subscribe to and depends
        # on nothing — consumers reference these without pulling Catalog
        # internals. CatalogPublishedLanguage is the narrow subset of
        # Catalog\Domain (currently ListingId + ListingKind) that other
        # contexts are allowed to import directly; CatalogDomain itself
        # is allowed to import it because subtracting these types from
        # CatalogDomain's collector means peers in Catalog\Domain see
        # them as belonging to a separate layer.
        # CatalogPublishedLanguage classes are still part of Catalog\Domain
        # semantically — they happen to be the narrow subset exported to
        # other contexts. They are allowed to reach back into the rest of
        # CatalogDomain for their own implementation needs (e.g. ListingId
        # references InvalidListingId which implements CatalogDomainException).
        # The boundary we are enforcing is one-way: Inventory may not
        # reach into CatalogDomain, but CatalogPublishedLanguage may.
        CatalogPublishedLanguage:
            - CatalogDomain
            - PsrClock
        CatalogDomain:
            - PsrClock
            - CatalogPublishedLanguage
        CatalogApplication:
            - CatalogDomain
            - CatalogPublishedLanguage
            - CatalogCrossBusCommands
            - CatalogCrossContextQueries
            - SymfonyMessenger
            - PsrClock
        CatalogInfrastructure:
            - CatalogDomain
            - CatalogApplication
            - CatalogIntegration
            - CatalogPublishedLanguage
            - SymfonyMessenger
            - PsrClock
            - Doctrine
            - DoctrineCollections
            - Symfony
            - Faker
            - SharedInfrastructure
        CatalogIntegration: []
        # CatalogCrossContextQueries holds read-side DTOs published
        # to downstream contexts (currently GetListingDetail,
        # ListingDetailView, FeeView for the LRA-86 Edit Inventory
        # Item dialog). Same emptiness contract as
        # CatalogCrossBusCommands — these types carry only primitives
        # and other published-language DTOs.
        CatalogCrossContextQueries: []
        # CatalogCrossBusCommands holds only primitive command DTOs
        # (currently App\Catalog\Application\Command\RegisterListing).
        # They carry no outgoing dependencies beyond scalar primitives,
        # so the allow-list is intentionally empty — any future
        # cross-bus DTO that needs a domain value object must add the
        # specific allowed target here, deliberately.
        CatalogCrossBusCommands: []
        # Inventory layers. Mirrors the Catalog/Households layouts.
        # InventoryDomain may import CatalogPublishedLanguage (ListingId
        # and ListingKind only) but is forbidden from importing the rest
        # of Catalog\Domain — preserving the "cross-context references
        # only via published-language types" rule from the project's
        # DDD conventions. DoctrineCollections is allowed in the domain
        # on the same Households precedent: aggregate roots may hold
        # child entities in a typed Collection so Doctrine ORM can
        # track child-collection changes for the one-to-many mappings
        # introduced later in this sprint (LRA-74 batches, LRA-77 PO
        # lines). Cross-context command dispatch (e.g. the atomic
        # Catalog+Inventory create in LRA-78) lives only in
        # InventoryInfrastructure and is granted by adding
        # CatalogApplication to that layer in the ticket that
        # introduces it — not here.
        InventoryDomain:
            - PsrClock
            - DoctrineCollections
            - CatalogPublishedLanguage
            - SharedDomain
        InventoryApplication:
            - InventoryDomain
            - CatalogPublishedLanguage
            - CatalogCrossBusCommands
            - SharedDomain
            - SymfonyMessenger
            - PsrClock
        InventoryInfrastructure:
            - InventoryDomain
            - InventoryApplication
            - InventoryIntegration
            - CatalogIntegration
            - CatalogPublishedLanguage
            # LRA-86: the InventoryItemFormController dispatches
            # Catalog Listing update DTOs (RenameListing,
            # UpdateListingFees, UpdateListingLedgerAccount,
            # UpdateListingTaxTreatment) directly because the
            # Edit Inventory Item dialog edits both context's
            # state in a single submission. The four DTOs are
            # whitelisted under CatalogCrossBusCommands.
            - CatalogCrossBusCommands
            # LRA-86: the same controller also needs the
            # GetListingDetail query DTO and its view types
            # (ListingDetailView, FeeView) to pre-fill the edit
            # form with the Listing's current name/code/fees.
            # CatalogCrossContextQueries is the narrow whitelist
            # that exposes exactly those types.
            - CatalogCrossContextQueries
            - SharedDomain
            - SymfonyMessenger
            - PsrClock
            - Doctrine
            - DoctrineCollections
            - Symfony
            - Faker
            - Picqer
            - SharedInfrastructure
        InventoryIntegration: []
        # Legacy now covers only the two root controllers
        # (HomeController, DashboardController) that LRA-13 left in place
        # because they belong to bounded contexts (Reports, Scheduling)
        # that have not yet been introduced. The permissive ruleset will
        # shrink further (or the layer will be removed entirely) once
        # those contexts exist and the controllers move under them.
        Legacy:
            - Legacy
            - Ui
            - Doctrine
            - DoctrineCollections
            - Symfony
            - SymfonyPasswordHasher
            - SymfonyMessenger
            - PsrClock
        Ui:
            - Ui
            - Symfony
            - Twig
            - PsrClock
        # Shared kernel: must remain framework-free so every consuming
        # context can depend on it from its Domain and Application layers.
        # PsrClock is the only allowed external import (mirrors the
        # per-context Domain rule).
        SharedDomain:
            - PsrClock
        SharedInfrastructure: []
